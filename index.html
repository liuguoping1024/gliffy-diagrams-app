    <script type="text/javascript">
(function(){window.__gliffyErrors=[];function addErr(t,e){var o={t:t,msg:e,time:new Date().toISOString()};window.__gliffyErrors.push(o);var d=document.getElementById("__gliffyLogBar");if(d){var c=d.querySelector(".count");if(c)c.textContent=window.__gliffyErrors.length;}}window.onerror=function(msg,url,line,col,err){addErr("error",(err&&err.stack)||msg+" at "+url+":"+line+(col?":"+col:""));return false;};window.addEventListener("unhandledrejection",function(e){addErr("reject",e.reason&&(e.reason.stack||String(e.reason))||String(e.reason));});document.addEventListener("DOMContentLoaded",function(){var bar=document.createElement("div");bar.id="__gliffyLogBar";bar.style.cssText="position:fixed;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);color:#eee;font:12px monospace;padding:4px 8px;z-index:99999;display:flex;align-items:center;gap:8px;";bar.innerHTML='<span class="count">'+window.__gliffyErrors.length+'</span> errors <button id="__gliffySaveLog" style="padding:2px 8px;">Save log</button> <button id="__gliffyToggleLog" style="padding:2px 8px;">Show</button>';document.body.appendChild(bar);var pre=document.createElement("pre");pre.id="__gliffyLogPre";pre.style.cssText="display:none;max-height:200px;overflow:auto;margin:0;padding:4px;font-size:11px;white-space:pre-wrap;word-break:break-all;";document.body.appendChild(pre);document.getElementById("__gliffySaveLog").onclick=function(){var s=window.__gliffyErrors.map(function(x){return "["+x.time+"] "+x.t+": "+x.msg;}).join("\n\n");var a=document.createElement("a");a.download="gliffy-errors.log";a.href=URL.createObjectURL(new Blob([s],"text/plain"));a.click();URL.revokeObjectURL(a.href);};document.getElementById("__gliffyToggleLog").onclick=function(){var p=document.getElementById("__gliffyLogPre");p.style.display=p.style.display==="none"?"block":"none";p.textContent=window.__gliffyErrors.map(function(x){return "["+x.time+"] "+x.t+": "+x.msg;}).join("\n\n");};});})();
    </script>
    <script type="text/javascript">
(function(){var _storage={};window.chrome=window.chrome||{};chrome.runtime=chrome.runtime||{};chrome.i18n=chrome.i18n||{};chrome.storage=chrome.storage||{};chrome.storage.local=chrome.storage.local||{};if(typeof chrome.runtime.getManifest!=="function"){chrome.runtime.getManifest=function(){return{version:"1.0.32"};};}chrome.runtime.lastError=null;if(typeof chrome.i18n.getMessage!=="function"){chrome.i18n.getMessage=function(n){if(n==="DESKTOP_SPLASH_LOADING")return "Loading...";return n||"";};}if(typeof chrome.storage.local.get!=="function"){chrome.storage.local.get=function(keys,cb){if(!cb)return;var out={},k=Array.isArray(keys)?keys:(keys==null?Object.keys(_storage):[keys]);for(var i=0;i<k.length;i++){if(_storage.hasOwnProperty(k[i]))out[k[i]]=_storage[k[i]];}setTimeout(function(){cb(out);},0);};}if(typeof chrome.storage.local.set!=="function"){chrome.storage.local.set=function(obj,cb){for(var key in obj)if(obj.hasOwnProperty(key))_storage[key]=obj[key];if(typeof cb==="function")setTimeout(cb,0);};}function forceHideSplash(){var s=document.getElementById("splash");if(s&&s.style.display!=="none"){s.style.display="none";var e=document.getElementById("editor");if(e)e.focus();}}function scheduleFallback(){setTimeout(forceHideSplash,2500);setTimeout(forceHideSplash,5000);}if(document.readyState==="complete")scheduleFallback();else{window.addEventListener("load",scheduleFallback);document.addEventListener("DOMContentLoaded",scheduleFallback);}})();
    </script>
